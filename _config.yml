title: Orion SDK
description: SolarWinds Orion SDK Documentation
github_repo: https://github.com/solarwinds/OrionSDK
theme: jekyll-theme-minimal
baseurl: "/OrionSDK"

plugins:
  - jemoji

# Build settings
markdown: kramdown
permalink: pretty

# Include docs folder
include:
  - docs

# Exclude version folders from Jekyll processing
exclude:
  - LICENSE
  - README.md
  - schema
  - swagger-ui
  - "2023.1"
  - "2023.2"
  - "2023.3"
  - "2023.4"
  - "2024.1"
  - "2024.2"
  - "2024.4"
  - "2024.4.1"
  - "2025.1"
  - "2025.1.1"
  - "2025.2"
  - "2025.2.1"
  - "2025.4"
  - "2026.1"

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
